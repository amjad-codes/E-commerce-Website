<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeCart - Premium E-Commerce</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo" onclick="window.scrollTo(0,0)">
                <i class="fas fa-shopping-bag"></i> LuxeCart
            </div>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#products">Products</a>
                <div class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <h1>Welcome to LuxeCart</h1>
        <p>Discover amazing products at unbeatable prices. Quality meets affordability.</p>
        
        <div class="search-container">
            <input type="text" class="search-bar" id="searchBar" placeholder="Search for products...">
            <button class="search-btn" onclick="searchProducts()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </section>

    <!-- Main Content -->
    <div class="container" id="products">
        <h2 class="section-title">Featured Products</h2>
        <div class="products-grid" id="productsGrid">
            <!-- Products will be inserted here by JavaScript -->
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-bag"></i> Your Cart</h2>
            <button class="close-cart" onclick="toggleCart()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">
                <i class="fas fa-shopping-basket"></i>
                <p>Your cart is empty</p>
            </div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="openCheckout()">
                Proceed to Checkout <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="overlay" id="modalOverlay" onclick="closeCheckout()"></div>
    <div class="modal" id="checkoutModal">
        <button class="close-modal" onclick="closeCheckout()">
            <i class="fas fa-times"></i>
        </button>
        <div class="modal-header">
            <h2><i class="fas fa-credit-card"></i> Checkout</h2>
            <p style="color: var(--gray); margin-top: 0.5rem;">Complete your purchase</p>
        </div>
        <form id="checkoutForm" onsubmit="placeOrder(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" required placeholder="123 Main Street">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" required placeholder="New York">
                </div>
                <div class="form-group">
                    <label>ZIP</label>
                    <input type="text" required placeholder="10001">
                </div>
            </div>
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" required placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Expiry</label>
                    <input type="text" required placeholder="MM/YY" maxlength="5">
                </div>
                <div class="form-group">
                    <label>CVV</label>
                    <input type="text" required placeholder="123" maxlength="3">
                </div>
            </div>
            <button type="submit" class="place-order-btn">
                Place Order <i class="fas fa-check"></i>
            </button>
        </form>
    </div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage">
        <i class="fas fa-check-circle"></i>
        <span id="successText">Item added to cart!</span>
    </div>

   
    <script src="app.js"></script>
</body>
</html>
